<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Section</title>

<link rel="stylesheet" href="newslist.css">

</head>

<body>

<!-- TOP TABS -->
<div class="top-tabs">
  <button id="articlesBtn" class="active">Articles</button>
  <button id="videosBtn">Videos</button>
</div>

<!-- NEWS SECTION -->
<section class="news-section">

  <!-- Loader -->
  <div id="loader" class="loader-grid"></div>

  <!-- News Grid -->
  <div id="newsContainer" class="news-grid"></div>

  <!-- Empty Message -->
  <p id="emptyMessage" class="empty-message">
    No news available.
  </p>

</section>

<script src="newslist.js"></script>

</body>
</html>
